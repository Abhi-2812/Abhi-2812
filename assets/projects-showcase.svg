      <rect x="18" y="18" width="284" height="138" rx="12" fill="#ECFDF5"/>
      <circle cx="88" cy="82" r="44" fill="#22C55E" fill-opacity=".22"/><path d="M88 44c38 34 24 74 0 90-24-16-38-56 0-90Z" fill="#16A34A"/>
      <rect x="150" y="54" width="114" height="14" rx="7" fill="var(--surface-soft)"/><rect x="150" y="82" width="84" height="10" rx="5" fill="#22C55E"/><rect x="150" y="106" width="118" height="10" rx="5" fill="#CBD5E1"/>
      <text x="24" y="188" fill="var(--ink)" font-size="18" font-weight="850">HerbTech</text>
    </g>
    <g transform="translate(256 430)" filter="url(#shadow)">
      <rect width="320" height="220" rx="18" fill="var(--surface-soft)"/>
      <rect x="18" y="18" width="284" height="138" rx="12" fill="#FFF7ED"/>
      <rect x="44" y="48" width="74" height="86" rx="10" fill="#EF4444"/><rect x="132" y="48" width="74" height="86" rx="10" fill="#F97316"/><rect x="220" y="48" width="48" height="86" rx="10" fill="var(--surface-soft)"/>
      <text x="24" y="188" fill="var(--ink)" font-size="18" font-weight="850">Abhishek Apparels Platform</text>
