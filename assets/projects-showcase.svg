      <rect width="320" height="220" rx="18" fill="var(--surface-soft)"/>
      <rect x="18" y="18" width="284" height="138" rx="12" fill="url(#screen)"/>
      <rect x="40" y="44" width="118" height="14" rx="7" fill="#5EEBFF"/><rect x="40" y="74" width="220" height="12" rx="6" fill="var(--surface-soft)" fill-opacity=".28"/><rect x="40" y="104" width="82" height="30" rx="15" fill="#8B5CF6"/>
      <circle cx="246" cy="56" r="24" fill="var(--ink)" fill-opacity=".16"/>
      <text x="24" y="188" fill="var(--ink)" font-size="18" font-weight="850">Portfolio / Personal Website</text>
