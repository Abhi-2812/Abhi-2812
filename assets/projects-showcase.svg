      <circle cx="278" cy="42" r="16" fill="#8B5CF6"/><text x="38" y="58" fill="#5EEBFF" font-size="18" font-weight="850">Agentic AI</text>
      <rect x="38" y="78" width="136" height="12" rx="6" fill="var(--surface-soft)" fill-opacity=".32"/><rect x="38" y="102" width="220" height="10" rx="5" fill="var(--surface-soft)" fill-opacity=".18"/>
      <path d="M202 80h58v48h-58z" fill="#8B5CF6" fill-opacity=".28" stroke="#5EEBFF"/>
      <text x="24" y="188" fill="var(--ink)" font-size="18" font-weight="850">Agentic AI Assistant</text>
    </g>
    <g transform="translate(440 154)" filter="url(#shadow)">
      <rect width="320" height="220" rx="18" fill="var(--surface-soft)"/>
      <rect x="18" y="18" width="284" height="138" rx="12" fill="#F8FAFC"/>
      <path d="M56 86h62M118 86c44-52 82 52 126 0" stroke="#8B5CF6" stroke-width="8" stroke-linecap="round"/><circle cx="56" cy="86" r="12" fill="#5EEBFF"/><circle cx="244" cy="86" r="12" fill="#A855F7"/>
      <text x="24" y="188" fill="var(--ink)" font-size="18" font-weight="850">AI Automation Workflow</text>
    </g>
