<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Recent projects showcase</title>
  <desc id="desc">Project cards with visual mockups for Agentic AI Assistant, AI Automation Workflow System, HerbTech, Abhishek Apparels Digital Platform, and Portfolio.</desc>
  <defs>
    <style>
      :root {
        color-scheme: light dark;
        --surface: #F8FAFC;
        --surface-soft: #FFFFFF;
        --ink: #111827;
        --ink-muted: #334155;
        --ink-accent: #6D28D9;
        --line: #CBD5E1;
        --glass-fill: #FFFFFF;
        --glass-opacity: .74;
        --glass-soft-opacity: .58;
        --glass-stroke: #CBD5E1;
        --shadow: #94A3B8;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --surface: #08080D;
          --surface-soft: #12121B;
          --ink: #FFFFFF;
          --ink-muted: #E5E7EB;
          --ink-accent: #C4B5FD;
          --line: #FFFFFF;
          --glass-fill: #FFFFFF;
          --glass-opacity: .10;
          --glass-soft-opacity: .045;
          --glass-stroke: #FFFFFF;
          --shadow: #000000;
        }
      }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760"><stop stop-color="var(--surface)"/><stop offset="1" stop-color="var(--surface-soft)"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#12121B"/><stop offset="1" stop-color="#08080D"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="var(--shadow)" flood-opacity=".18"/></filter>
  </defs>
  <rect width="1200" height="760" rx="32" fill="url(#bg)"/>
  <text x="72" y="70" fill="var(--ink)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="750">Curious about my work?</text>
  <text x="72" y="110" fill="var(--ink)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="900">Recent projects</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(72 154)" filter="url(#shadow)">
