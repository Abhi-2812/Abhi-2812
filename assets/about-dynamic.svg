<svg width="1200" height="390" viewBox="0 0 1200 390" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">About Abhishek Chaskar</title>
  <desc id="desc">Animated glassmorphism about section for Abhishek Chaskar.</desc>
  <defs>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 78) rotate(36) scale(520 240)">
      <stop stop-color="#8B5CF6" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#08080D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 120) rotate(137) scale(420 220)">
      <stop stop-color="#5EEBFF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#08080D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="52" y1="48" x2="1148" y2="342" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEBFF" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#A855F7" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.12"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="390" rx="30" fill="#08080D"/>
  <rect width="1200" height="390" rx="30" fill="url(#g1)"/>
  <rect width="1200" height="390" rx="30" fill="url(#g2)"/>
  <rect x="38" y="36" width="1124" height="318" rx="28" fill="#FFFFFF" fill-opacity="0.07" stroke="url(#stroke)"/>
  <g opacity="0.48">
    <circle cx="956" cy="154" r="76" stroke="#5EEBFF" stroke-opacity="0.22">
      <animate attributeName="r" values="68;86;68" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.28;0.55;0.28" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="956" cy="154" r="112" stroke="#8B5CF6" stroke-opacity="0.22">
      <animate attributeName="r" values="104;126;104" dur="7s" repeatCount="indefinite"/>
    </circle>
    <path d="M790 274C875 206 998 246 1082 184" stroke="#A855F7" stroke-opacity="0.34" stroke-width="2"/>
  </g>
  <g transform="translate(76 70)">
    <rect x="0" y="0" width="136" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.09" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <circle cx="22" cy="17" r="5" fill="#5EEBFF">
      <animate attributeName="opacity" values="0.45;1;0.45" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="40" y="22" fill="#EDE9FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">About me</text>
  </g>
  <text x="76" y="146" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="800">Hey, I'm Abhishek Chaskar.</text>
  <text x="76" y="194" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="500">I build products where Artificial Intelligence, Automation, and Modern Engineering</text>
  <text x="76" y="224" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="500">come together to solve real business problems.</text>
  <text x="76" y="270" fill="#EDE9FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Currently building production-ready AI systems and AI-powered automation workflows at ztudium.</text>
  <text x="76" y="304" fill="#C4B5FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">React / Node.js / GraphQL / Supabase / Strapi / OpenAI / Google Gemini / n8n</text>
  <g transform="translate(820 98)">
    <rect x="0" y="0" width="244" height="158" rx="26" fill="#12121B" fill-opacity="0.84" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="122" y="88" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="62" font-weight="800">AC</text>
    <circle cx="36" cy="34" r="8" fill="#5EEBFF"/>
    <circle cx="204" cy="126" r="9" fill="#A855F7"/>
  </g>
</svg>
