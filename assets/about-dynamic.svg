<svg width="1400" height="420" viewBox="0 0 1400 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">About Me</title>
  <desc id="desc">About section describing Abhishek Chaskar's AI engineering work.</desc>
  <defs>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 60) rotate(125) scale(520 300)">
      <stop stop-color="#7C3AED" stop-opacity=".28"/>
      <stop offset="1" stop-color="#0B0F19" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#000000" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect width="1400" height="420" rx="28" fill="#0B0F19"/>
  <rect width="1400" height="420" rx="28" fill="url(#glow)"/>
  <g filter="url(#shadow)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="70" y="60" width="1260" height="300" rx="24" fill="#111827" stroke="#FFFFFF" stroke-opacity=".08"/>
    <text x="118" y="126" fill="#F8FAFC" font-size="34" font-weight="900">Building AI products that move from prototype to production.</text>
    <text x="118" y="176" fill="#CBD5E1" font-size="20" font-weight="500">I work where Artificial Intelligence, Automation, and Modern Engineering meet real business problems.</text>
    <text x="118" y="218" fill="#CBD5E1" font-size="20" font-weight="500">At ztudium, I build production-ready AI systems and AI-powered automation workflows.</text>
    <text x="118" y="270" fill="#94A3B8" font-size="18" font-weight="600">Core stack: React, Node.js, GraphQL, Supabase, Strapi, OpenAI, Google Gemini, and n8n.</text>
    <path d="M118 305H780" stroke="#FFFFFF" stroke-opacity=".08"/>
    <text x="118" y="335" fill="#C4B5FD" font-size="17" font-weight="700">Software should feel premium, perform reliably, and solve real-world problems.</text>
    <g transform="translate(1030 116)">
      <rect width="220" height="176" rx="24" fill="#0B0F19" stroke="#FFFFFF" stroke-opacity=".08"/>
      <text x="110" y="82" text-anchor="middle" fill="#F8FAFC" font-size="42" font-weight="900">AI</text>
      <text x="110" y="122" text-anchor="middle" fill="#94A3B8" font-size="15" font-weight="700">Product Engineering</text>
      <circle cx="44" cy="44" r="7" fill="#7C3AED"/>
      <circle cx="176" cy="132" r="7" fill="#7C3AED"/>
    </g>
  </g>
</svg>
