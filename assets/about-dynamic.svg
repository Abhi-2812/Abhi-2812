<svg width="1600" height="430" viewBox="0 0 1600 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">About Abhishek Chaskar</title>
  <desc id="desc">Glass card about section for Abhishek Chaskar.</desc>
  <defs>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 24) rotate(120) scale(760 330)">
      <stop stop-color="#5EEBFF" stop-opacity=".20"/>
      <stop offset=".52" stop-color="#8B5CF6" stop-opacity=".20"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FFFFFF" stop-opacity=".10"/><stop offset="1" stop-color="#FFFFFF" stop-opacity=".035"/></linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#FFFFFF" stop-opacity=".12"/><stop offset="1" stop-color="#FFFFFF" stop-opacity=".045"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".32"/></filter>
    <style>.h{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900}.t{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800}.b{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:600}</style>
  </defs>
  <rect width="1600" height="430" rx="34" fill="#020617"/>
  <rect width="1600" height="430" rx="34" fill="url(#glow)"/>
  <rect x="18" y="18" width="1564" height="394" rx="24" fill="url(#panel)" stroke="#8B5CF6"/>
  <g transform="translate(58 58)">
    <circle cx="32" cy="32" r="32" fill="#8B5CF6" fill-opacity=".28"/>
    <text x="32" y="43" text-anchor="middle" fill="#FFFFFF" class="h" font-size="28">AC</text>
    <text x="86" y="44" fill="#FFFFFF" class="h" font-size="34">About Me</text>
    <path d="M86 72H212" stroke="#A855F7" stroke-width="4" stroke-linecap="round"/>
    <circle cx="212" cy="72" r="4" fill="#A855F7"/>
  </g>
  <text x="60" y="178" fill="#FFFFFF" class="h" font-size="42">Hey, I'm Abhishek Chaskar.</text>
  <text x="60" y="220" fill="#E5E7EB" class="b" font-size="24">I build premium AI products, automation workflows, and full stack systems that solve real business problems.</text>
  <text x="60" y="260" fill="#C4B5FD" class="b" font-size="22">Currently building production-ready AI systems and AI-powered automation workflows at ztudium.</text>
  <g filter="url(#shadow)" class="t" font-size="19" fill="#FFFFFF">
    <g transform="translate(60 306)"><rect width="248" height="68" rx="15" fill="url(#pill)" stroke="#5EEBFF" stroke-opacity=".18"/><circle cx="42" cy="34" r="22" fill="#38BDF8" fill-opacity=".16"/><text x="42" y="42" text-anchor="middle" fill="#38BDF8" font-size="22">AI</text><text x="78" y="42">AI Systems</text></g>
    <g transform="translate(330 306)"><rect width="300" height="68" rx="15" fill="url(#pill)" stroke="#A855F7" stroke-opacity=".20"/><circle cx="42" cy="34" r="22" fill="#8B5CF6" fill-opacity=".18"/><text x="42" y="42" text-anchor="middle" fill="#C084FC" font-size="18">n8n</text><text x="78" y="42">Automation</text></g>
    <g transform="translate(652 306)"><rect width="256" height="68" rx="15" fill="url(#pill)" stroke="#22C55E" stroke-opacity=".20"/><circle cx="42" cy="34" r="22" fill="#22C55E" fill-opacity=".16"/><text x="42" y="42" text-anchor="middle" fill="#86EFAC" font-size="18">API</text><text x="78" y="42">Backend APIs</text></g>
    <g transform="translate(930 306)"><rect width="288" height="68" rx="15" fill="url(#pill)" stroke="#EC4899" stroke-opacity=".20"/><circle cx="42" cy="34" r="22" fill="#EC4899" fill-opacity=".16"/><text x="42" y="42" text-anchor="middle" fill="#F472B6" font-size="18">UI</text><text x="78" y="42">Product UI</text></g>
    <g transform="translate(1240 306)"><rect width="282" height="68" rx="15" fill="url(#pill)" stroke="#F59E0B" stroke-opacity=".22"/><circle cx="42" cy="34" r="22" fill="#F59E0B" fill-opacity=".16"/><text x="42" y="42" text-anchor="middle" fill="#FBBF24" font-size="18">FS</text><text x="78" y="42">Full Stack</text></g>
  </g>
  <g transform="translate(1320 64)" opacity=".55">
    <circle cx="88" cy="92" r="72" stroke="#5EEBFF" stroke-opacity=".22"/>
    <circle cx="88" cy="92" r="108" stroke="#8B5CF6" stroke-opacity=".22"/>
    <path d="M-20 204C64 136 188 176 272 114" stroke="#A855F7" stroke-opacity=".34" stroke-width="2"/>
  </g>
