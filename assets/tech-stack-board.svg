<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tech Stack</title>
  <desc id="desc">Premium categorized technology stack cards.</desc>
  <defs>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(700 0) rotate(90) scale(500 780)">
      <stop stop-color="#7C3AED" stop-opacity=".25"/>
      <stop offset="1" stop-color="#0B0F19" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0B0F19"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000000" flood-opacity=".22"/>
    </filter>
    <style>.h{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900}.p{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:550}.m{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800}</style>
  </defs>
  <rect width="1400" height="820" rx="28" fill="#0B0F19"/>
  <rect width="1400" height="820" rx="28" fill="url(#glow)"/>
  <text x="700" y="78" text-anchor="middle" fill="#F8FAFC" class="h" font-size="56">Tech Stack</text>
  <text x="700" y="116" text-anchor="middle" fill="#94A3B8" class="p" font-size="20">AI products • Full stack systems • Workflow automation</text>
  <g filter="url(#shadow)">
    <g transform="translate(50 154)">
      <rect width="400" height="190" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity=".08"/>
      <rect x="26" y="26" width="54" height="54" rx="15" fill="#7C3AED" fill-opacity=".16" stroke="#7C3AED" stroke-opacity=".4"/>
      <text x="53" y="62" text-anchor="middle" fill="#C4B5FD" class="h" font-size="28">UI</text>
      <text x="102" y="50" fill="#F8FAFC" class="h" font-size="24">Frontend</text>
      <text x="102" y="76" fill="#94A3B8" class="p" font-size="15">Responsive product interfaces</text>
      <text x="28" y="128" fill="#F8FAFC" class="m" font-size="17">React · Next.js · JavaScript · HTML · CSS</text>
      <text x="28" y="158" fill="#94A3B8" class="m" font-size="16">Bootstrap · Framer Motion</text>
    </g>
    <g transform="translate(500 154)">
      <rect width="400" height="190" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity=".08"/>
      <rect x="26" y="26" width="54" height="54" rx="15" fill="#7C3AED" fill-opacity=".16" stroke="#7C3AED" stroke-opacity=".4"/>
      <text x="53" y="62" text-anchor="middle" fill="#C4B5FD" class="h" font-size="26">API</text>
      <text x="102" y="50" fill="#F8FAFC" class="h" font-size="24">Backend</text>
      <text x="102" y="76" fill="#94A3B8" class="p" font-size="15">APIs and server-side systems</text>
      <text x="28" y="128" fill="#F8FAFC" class="m" font-size="17">Node.js · FastAPI · Flask · GraphQL</text>
      <text x="28" y="158" fill="#94A3B8" class="m" font-size="16">Sequelize · REST APIs</text>
    </g>
    <g transform="translate(950 154)">
      <rect width="400" height="190" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity=".08"/>
      <rect x="26" y="26" width="54" height="54" rx="15" fill="#7C3AED" fill-opacity=".16" stroke="#7C3AED" stroke-opacity=".4"/>
      <text x="53" y="62" text-anchor="middle" fill="#C4B5FD" class="h" font-size="26">AI</text>
      <text x="102" y="50" fill="#F8FAFC" class="h" font-size="24">AI / Data</text>
      <text x="102" y="76" fill="#94A3B8" class="p" font-size="15">Models, data and intelligence</text>
      <text x="28" y="128" fill="#F8FAFC" class="m" font-size="17">Python · TensorFlow · PyTorch · OpenAI</text>
      <text x="28" y="158" fill="#94A3B8" class="m" font-size="16">Gemini · OpenCV · NumPy · Pandas</text>
    </g>
    <g transform="translate(50 384)">
      <rect width="400" height="190" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity=".08"/>
      <rect x="26" y="26" width="54" height="54" rx="15" fill="#7C3AED" fill-opacity=".16" stroke="#7C3AED" stroke-opacity=".4"/>
      <text x="53" y="62" text-anchor="middle" fill="#C4B5FD" class="h" font-size="24">DB</text>
      <text x="102" y="50" fill="#F8FAFC" class="h" font-size="24">Databases / CMS</text>
      <text x="102" y="76" fill="#94A3B8" class="p" font-size="15">Storage and content systems</text>
      <text x="28" y="128" fill="#F8FAFC" class="m" font-size="17">Supabase · MySQL · Strapi CMS</text>
    </g>
    <g transform="translate(500 384)">
      <rect width="400" height="190" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity=".08"/>
      <rect x="26" y="26" width="54" height="54" rx="15" fill="#7C3AED" fill-opacity=".16" stroke="#7C3AED" stroke-opacity=".4"/>
      <text x="53" y="62" text-anchor="middle" fill="#C4B5FD" class="h" font-size="26">∞</text>
      <text x="102" y="50" fill="#F8FAFC" class="h" font-size="24">Automation</text>
      <text x="102" y="76" fill="#94A3B8" class="p" font-size="15">Pipelines, QA and workflows</text>
      <text x="28" y="128" fill="#F8FAFC" class="m" font-size="17">n8n · Selenium · Playwright</text>
      <text x="28" y="158" fill="#94A3B8" class="m" font-size="16">Puppeteer · Prompt Engineering</text>
    </g>
    <g transform="translate(950 384)">
      <rect width="400" height="190" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity=".08"/>
      <rect x="26" y="26" width="54" height="54" rx="15" fill="#7C3AED" fill-opacity=".16" stroke="#7C3AED" stroke-opacity=".4"/>
      <text x="53" y="62" text-anchor="middle" fill="#C4B5FD" class="h" font-size="24">☁</text>
      <text x="102" y="50" fill="#F8FAFC" class="h" font-size="24">Cloud</text>
      <text x="102" y="76" fill="#94A3B8" class="p" font-size="15">Deploy and scale applications</text>
      <text x="28" y="128" fill="#F8FAFC" class="m" font-size="17">AWS · Google Cloud · Cloudflare</text>
      <text x="28" y="158" fill="#94A3B8" class="m" font-size="16">Vercel · Render · Docker</text>
    </g>
    <g transform="translate(50 614)">
      <rect width="1300" height="142" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity=".08"/>
      <rect x="26" y="32" width="54" height="54" rx="15" fill="#7C3AED" fill-opacity=".16" stroke="#7C3AED" stroke-opacity=".4"/>
      <text x="53" y="68" text-anchor="middle" fill="#C4B5FD" class="h" font-size="24">⌘</text>
      <text x="102" y="56" fill="#F8FAFC" class="h" font-size="24">Tools / Design</text>
      <text x="102" y="84" fill="#94A3B8" class="p" font-size="15">Git · GitHub · Figma · Notion · Canva · Jira · Confluence</text>
      <text x="102" y="114" fill="#94A3B8" class="p" font-size="15">Development tools and design workflow for shipping polished products.</text>
    </g>
  </g>
</svg>
