    <g transform="translate(630 150)"><rect width="118" height="118" rx="24" fill="url(#tile)" stroke="#FFFFFF" stroke-opacity=".12"/><text x="59" y="70" fill="#7DD3FC" font-size="29">Node</text></g>
    <g transform="translate(790 150)"><rect width="118" height="118" rx="24" fill="url(#tile)" stroke="#FFFFFF" stroke-opacity=".12"/><text x="59" y="70" fill="#F7DF1E" font-size="24">JavaScript</text></g>
