<svg width="1600" height="1060" viewBox="0 0 1600 1060" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tech Stack</title>
  <desc id="desc">Categorized technology stack dashboard using local logo assets.</desc>
  <defs>
