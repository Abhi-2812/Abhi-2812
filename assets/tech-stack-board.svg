      <stop stop-color="#8B5CF6" stop-opacity=".34"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1260 60) rotate(137) scale(780 390)">
