<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Technology stack board</title>
  <desc id="desc">A premium board of technology logo tiles grouped around stack of technology.</desc>
  <defs>
    <radialGradient id="bg1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 100) rotate(35) scale(520 260)">
      <stop stop-color="#8B5CF6" stop-opacity=".34"/>
      <stop offset="1" stop-color="#08080D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(940 60) rotate(140) scale(560 260)">
      <stop stop-color="#5EEBFF" stop-opacity=".22"/>
      <stop offset="1" stop-color="#08080D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity=".14"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity=".06"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="620" rx="34" fill="#08080D"/>
  <rect width="1200" height="620" rx="34" fill="url(#bg1)"/>
  <rect width="1200" height="620" rx="34" fill="url(#bg2)"/>
  <text x="600" y="72" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="850">Stack Of Technology</text>
  <text x="600" y="104" text-anchor="middle" fill="#C4B5FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">AI products / full stack systems / workflow automation</text>
  <circle cx="600" cy="316" r="84" fill="#FFFFFF" fill-opacity=".045" stroke="#A855F7" stroke-opacity=".34"/>
