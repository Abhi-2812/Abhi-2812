<svg width="1400" height="390" viewBox="0 0 1400 390" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Current Focus</title>
  <desc id="desc">Four current focus cards.</desc>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0B0F19"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000000" flood-opacity=".22"/>
    </filter>
    <style>.h{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900}.p{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:550}</style>
  </defs>
  <rect width="1400" height="390" rx="28" fill="#0B0F19"/>
  <g filter="url(#shadow)">
    <g transform="translate(60 56)">
      <rect width="610" height="122" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity=".08"/>
      <circle cx="46" cy="42" r="11" fill="#7C3AED"/>
      <text x="82" y="50" fill="#F8FAFC" class="h" font-size="26">Building AI Agents</text>
      <text x="32" y="88" fill="#94A3B8" class="p" font-size="17">Designing production-ready multi-agent AI systems.</text>
    </g>
    <g transform="translate(730 56)">
      <rect width="610" height="122" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity=".08"/>
      <circle cx="46" cy="42" r="11" fill="#7C3AED"/>
      <text x="82" y="50" fill="#F8FAFC" class="h" font-size="26">Workflow Automation</text>
      <text x="32" y="88" fill="#94A3B8" class="p" font-size="17">Creating scalable automation pipelines using n8n.</text>
    </g>
    <g transform="translate(60 214)">
      <rect width="610" height="122" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity=".08"/>
      <circle cx="46" cy="42" r="11" fill="#7C3AED"/>
      <text x="82" y="50" fill="#F8FAFC" class="h" font-size="26">Full Stack Development</text>
      <text x="32" y="88" fill="#94A3B8" class="p" font-size="17">Building AI-first SaaS applications with clean UX.</text>
    </g>
    <g transform="translate(730 214)">
      <rect width="610" height="122" rx="18" fill="url(#card)" stroke="#FFFFFF" stroke-opacity=".08"/>
      <circle cx="46" cy="42" r="11" fill="#7C3AED"/>
      <text x="82" y="50" fill="#F8FAFC" class="h" font-size="26">Manufacturing Technology</text>
      <text x="32" y="88" fill="#94A3B8" class="p" font-size="17">Modernizing apparel manufacturing through software.</text>
    </g>
  </g>
</svg>
