    </g>
    <g transform="translate(486 310)">
      <rect x="62" y="0" width="520" height="46" rx="20" fill="#E9D5FF" stroke="#111827" stroke-width="2"/>
      <text x="86" y="29" fill="#111827" font-size="15" font-weight="700">I help grow my family's apparel manufacturing business with tech.</text>
      <circle cx="24" cy="24" r="20" fill="#A855F7" fill-opacity=".28" stroke="#111827" stroke-width="2"/>
      <path d="M12 24h24M24 12v24" stroke="#111827" stroke-width="3"/>
    </g>
  </g>
