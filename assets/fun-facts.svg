<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fun facts about Abhishek Chaskar</title>
  <desc id="desc">An avatar card with fun facts about building AI apps, hackathons, automation, and apparel manufacturing.</desc>
  <rect width="1200" height="430" rx="34" fill="#F8F1E8"/>
  <path d="M430 50v330" stroke="#111827" stroke-opacity=".45" stroke-dasharray="10 10"/>
  <g transform="translate(94 58)">
