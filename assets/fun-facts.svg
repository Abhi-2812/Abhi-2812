    <path d="M78 126C74 52 122 22 164 34c42 12 70 54 64 100" fill="#B6F4F6" stroke="#111827" stroke-width="3"/>
    <circle cx="118" cy="126" r="14" fill="#111827"/><circle cx="184" cy="126" r="14" fill="#111827"/>
    <path d="M138 168c18 18 42 18 60 0" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
    <rect x="88" y="210" width="128" height="86" rx="12" fill="#FFFFFF" stroke="#111827" stroke-width="3"/>
    <path d="M88 242h128M88 270h128" stroke="#A855F7" stroke-width="3"/>
