    <text x="150" y="362" text-anchor="middle" fill="#111827" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">AI ENGINEER</text>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="486" y="78" fill="#111827" font-size="22" font-weight="950">FUN FACTS</text>
    <g transform="translate(486 106)">
      <rect x="62" y="0" width="520" height="46" rx="20" fill="#FFF7C2" stroke="#111827" stroke-width="2"/>
      <text x="86" y="29" fill="#111827" font-size="15" font-weight="700">I enjoy turning ideas into real products, not just demos.</text>
      <path d="M24 8c22 18 22 38 0 54C2 46 2 26 24 8Z" fill="#FACC15" stroke="#111827" stroke-width="2"/>
    </g>
    <g transform="translate(486 174)">
      <rect x="62" y="0" width="520" height="46" rx="20" fill="#FFD6E7" stroke="#111827" stroke-width="2"/>
      <text x="86" y="29" fill="#111827" font-size="15" font-weight="700">I like leading hackathon teams and shipping under pressure.</text>
      <path d="M24 0v58M10 16h28M8 42h32" stroke="#111827" stroke-width="3"/>
    </g>
    <g transform="translate(486 242)">
      <rect x="62" y="0" width="520" height="46" rx="20" fill="#CFFAFE" stroke="#111827" stroke-width="2"/>
      <text x="86" y="29" fill="#111827" font-size="15" font-weight="700">I automate workflows with AI, n8n, OpenAI, and Gemini.</text>
