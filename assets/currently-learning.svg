<svg width="1600" height="470" viewBox="0 0 1600 470" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Currently Learning</title>
  <desc id="desc">Glass card grid showing current learning topics.</desc>
  <defs>
    <style>
      :root {
        color-scheme: light dark;
        --surface: #F4F7FB;
        --surface-soft: #EEF2FF;
        --ink: #0F172A;
        --ink-muted: #334155;
        --ink-accent: #5B21B6;
        --glass-opacity: .86;
        --glass-soft-opacity: .72;
        --glass-stroke: #A78BFA;
        --shadow: #CBD5E1;
        --panel-start: .62;
        --panel-end: .34;
        --pill-start: .76;
        --pill-end: .42;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --surface: #08080D;
          --surface-soft: #12121B;
          --ink: #FFFFFF;
          --ink-muted: #E5E7EB;
          --ink-accent: #C4B5FD;
          --glass-opacity: .10;
          --glass-soft-opacity: .045;
          --glass-stroke: #FFFFFF;
          --shadow: #000000;
          --panel-start: .10;
          --panel-end: .035;
          --pill-start: .12;
          --pill-end: .045;
        }
      }
      .h{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900}
      .t{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800}
    </style>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(920 40) rotate(120) scale(760 340)">
      <stop stop-color="#5EEBFF" stop-opacity=".18"/>
      <stop offset=".5" stop-color="#8B5CF6" stop-opacity=".18"/>
      <stop offset="1" stop-color="var(--surface)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="var(--panel-start)"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="var(--panel-end)"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="var(--pill-start)"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="var(--pill-end)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="var(--shadow)" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="1600" height="470" rx="34" fill="var(--surface)"/>
  <rect width="1600" height="470" rx="34" fill="url(#glow)"/>
  <rect x="18" y="18" width="1564" height="434" rx="24" fill="url(#panel)" stroke="#8B5CF6"/>
  <g transform="translate(58 58)">
    <circle cx="32" cy="32" r="32" fill="#8B5CF6" fill-opacity=".24"/>
    <text x="32" y="40" text-anchor="middle" fill="var(--ink-accent)" class="h" font-size="20">CL</text>
    <text x="86" y="44" fill="var(--ink)" class="h" font-size="34">Currently Learning</text>
  </g>
  <g filter="url(#shadow)" class="t" font-size="21" fill="var(--ink)">
    <g transform="translate(60 136)"><rect width="286" height="84" rx="16" fill="url(#pill)" stroke="var(--glass-stroke)" stroke-opacity=".22"/><circle cx="50" cy="42" r="26" fill="#8B5CF6" fill-opacity=".20"/><text x="50" y="49" text-anchor="middle" fill="#7C3AED" font-size="20">AI</text><text x="94" y="50">Agentic AI</text></g>
    <g transform="translate(366 136)"><rect width="312" height="84" rx="16" fill="url(#pill)" stroke="var(--glass-stroke)" stroke-opacity=".22"/><circle cx="50" cy="42" r="26" fill="#22C55E" fill-opacity=".18"/><text x="50" y="49" text-anchor="middle" fill="#16A34A" font-size="18">LLM</text><text x="94" y="38">Large Language</text><text x="94" y="64">Models</text></g>
    <g transform="translate(698 136)"><rect width="306" height="84" rx="16" fill="url(#pill)" stroke="#5EEBFF" stroke-opacity=".28"/><circle cx="50" cy="42" r="26" fill="#0EA5E9" fill-opacity=".18"/><text x="50" y="49" text-anchor="middle" fill="#0284C7" font-size="18">GE</text><text x="94" y="50">Google Gemini API</text></g>
    <g transform="translate(1024 136)"><rect width="240" height="84" rx="16" fill="url(#pill)" stroke="#22C55E" stroke-opacity=".28"/><circle cx="50" cy="42" r="26" fill="#22C55E" fill-opacity=".18"/><text x="50" y="49" text-anchor="middle" fill="#16A34A" font-size="18">OA</text><text x="94" y="50">OpenAI API</text></g>
    <g transform="translate(1284 136)"><rect width="238" height="84" rx="16" fill="url(#pill)" stroke="#EC4899" stroke-opacity=".28"/><circle cx="50" cy="42" r="26" fill="#EC4899" fill-opacity=".16"/><text x="50" y="49" text-anchor="middle" fill="#DB2777" font-size="16">GQL</text><text x="94" y="50">GraphQL</text></g>

    <g transform="translate(60 244)"><rect width="320" height="84" rx="16" fill="url(#pill)" stroke="#F97316" stroke-opacity=".28"/><circle cx="50" cy="42" r="26" fill="#F97316" fill-opacity=".16"/><text x="50" y="49" text-anchor="middle" fill="#EA580C" font-size="18">n8n</text><text x="94" y="50">n8n Automation</text></g>
    <g transform="translate(398 244)"><rect width="320" height="84" rx="16" fill="url(#pill)" stroke="#5EEBFF" stroke-opacity=".26"/><circle cx="50" cy="42" r="26" fill="#14B8A6" fill-opacity=".16"/><text x="50" y="49" text-anchor="middle" fill="#0891B2" font-size="18">DB</text><text x="94" y="50">Supabase</text></g>
    <g transform="translate(736 244)"><rect width="310" height="84" rx="16" fill="url(#pill)" stroke="#8B5CF6" stroke-opacity=".28"/><circle cx="50" cy="42" r="26" fill="#8B5CF6" fill-opacity=".18"/><text x="50" y="49" text-anchor="middle" fill="#7C3AED" font-size="17">CMS</text><text x="94" y="50">Strapi CMS</text></g>
    <g transform="translate(1064 244)"><rect width="336" height="84" rx="16" fill="url(#pill)" stroke="#F59E0B" stroke-opacity=".30"/><circle cx="50" cy="42" r="26" fill="#F59E0B" fill-opacity=".16"/><text x="50" y="50" text-anchor="middle" fill="#D97706" font-size="26">&gt;_</text><text x="94" y="38">Advanced Prompt</text><text x="94" y="64">Engineering</text></g>

    <g transform="translate(66 352)"><rect width="322" height="84" rx="16" fill="url(#pill)" stroke="#38BDF8" stroke-opacity=".28"/><circle cx="50" cy="42" r="26" fill="#38BDF8" fill-opacity=".16"/><text x="50" y="49" text-anchor="middle" fill="#0284C7" font-size="20">AI</text><text x="94" y="38">AI Product</text><text x="94" y="64">Development</text></g>
    <g transform="translate(408 352)"><rect width="322" height="84" rx="16" fill="url(#pill)" stroke="#F472B6" stroke-opacity=".28"/><circle cx="50" cy="42" r="26" fill="#F472B6" fill-opacity=".16"/><text x="50" y="49" text-anchor="middle" fill="#DB2777" font-size="19">FS</text><text x="94" y="38">Full Stack</text><text x="94" y="64">Development</text></g>
    <g transform="translate(750 352)"><rect width="390" height="84" rx="16" fill="url(#pill)" stroke="#22D3EE" stroke-opacity=".28"/><circle cx="50" cy="42" r="26" fill="#22D3EE" fill-opacity=".16"/><text x="50" y="49" text-anchor="middle" fill="#0891B2" font-size="19">WF</text><text x="94" y="50">Workflow Automation</text></g>
  </g>
</svg>
