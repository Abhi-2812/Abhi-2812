    <g transform="translate(118 256)">
      <circle cx="10" cy="10" r="6" fill="#7C3AED"/>
      <text x="34" y="16" fill="#F8FAFC" class="m" font-size="17">Hackathon leadership, workflow automation, full stack engineering, and manufacturing technology.</text>
