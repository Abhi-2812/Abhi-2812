<svg width="1400" height="360" viewBox="0 0 1400 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Experience</title>
  <desc id="desc">Experience and operating principles.</desc>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111827"/><stop offset="1" stop-color="#0B0F19"/></linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000000" flood-opacity=".22"/></filter>
    <style>.h{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:900}.p{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:550}.m{font-family:Inter,Segoe UI,Arial,sans-serif;font-weight:800}</style>
  </defs>
  <rect width="1400" height="360" rx="28" fill="#0B0F19"/>
  <g filter="url(#shadow)">
    <rect x="70" y="58" width="1260" height="244" rx="20" fill="url(#card)" stroke="#FFFFFF" stroke-opacity=".08"/>
