    <path d="M118 190H1282" stroke="#FFFFFF" stroke-opacity=".08"/>
    <g transform="translate(118 220)">
      <circle cx="10" cy="10" r="6" fill="#7C3AED"/>
      <text x="34" y="16" fill="#F8FAFC" class="m" font-size="17">AI product development from prototype to reliable user-facing systems.</text>
